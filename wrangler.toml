# Workers + Static Assets config for the Cloudflare deploy.
# Wrangler 4 prefers this shape over the legacy `pages_build_output_dir`
# field — without an unambiguous Worker config at the workspace root,
# `wrangler deploy` errors with the monorepo detection message.

name = "mainstay-marketing"
compatibility_date = "2026-05-20"

[assets]
directory = "./apps/marketing/dist"
